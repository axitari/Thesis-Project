<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kandili - Log In</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Access your Kandili dashboard</p>
        </div>
        
       <section class="login-card">
          <h3>Sign in</h3>
          <form id="loginForm">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="name@school.edu" />

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password" />

            <label for="role">Role</label>
            <select id="role" name="role">
              <option value="teacherdashboard.html">Teacher</option>
              <option value="principaldashboard.html">Principal</option>
              <option value="admindashboard.html">Admin</option>
            </select>

            <button type="submit" class="btn-primary">Login</button>
          </form>
        </section>

        <div class="footer-text">
            <p>Don't have an account? <a href="register.html">Sign up here.</a></p>
        </div>
    </div>
    <!-- 1. Load the Supabase library from the CDN -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2. Load your connection script -->
        <script src="../static/supabaseClient.js"></script>

    <!-- 3. Your logic for this specific page -->
        <script src="../static/loginLogic.js"></script>
</body>
</html>

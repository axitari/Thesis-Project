<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Directory - Kandili Workspace</title>
    
    <!-- External CSS Files -->
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/facultyDirectory.css">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../static/supabaseClient.js"></script>
    <script src="../static/authGuard.js" data-allowed-roles="principal"></script>
    <script src="../static/logout.js"></script>
    <script src="../static/principalDashboard.js"></script>
</head>
<body class="dashboard-body">

    <!-- TOP NAVBAR -->
    <header class="theme-nav">
        <div class="theme-nav__brand">
            <button class="theme-nav__back" onclick="window.location.href='principaldashboard.html'" type="button" title="Back to Dashboard">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="theme-nav__logo">
                <span class="theme-nav__logo-icon">🏫</span>
                <span>Kandili</span>
                <span class="logo-badge">Workspace</span>
            </div>
            <div class="theme-nav__title">Faculty Directory</div>
        </div>
        <div class="theme-nav__actions">
            <span class="theme-nav__date"><i class="far fa-calendar-alt"></i> July 23, 2026</span>
            <button class="theme-nav__refresh" type="button" onclick="window.location.reload()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="dashboard-container">
        
        <!-- HEADER & SEARCH BAR -->
        <div class="directory-header">
            <div class="directory-header-top">
                <h2><i class="fas fa-folder-open icon-amber"></i> Master Class Programs Directory</h2>
            </div>
            
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="facultySearch" class="search-bar" placeholder="Search teacher name, grade level, or section..." onkeyup="filterDirectory()">
            </div>
        </div>
        
        <!-- FACULTY GRID CARD LIST -->
        <div class="directory-grid" id="facultyGrid">
            
            <!-- Faculty Item 1 -->
            <div class="faculty-card">
                <div class="faculty-avatar">BM</div>
                <div class="faculty-info">
                    <div class="faculty-name">Beverly Ann C. Matulac</div>
                    <div class="faculty-role"><i class="fas fa-chalkboard-user"></i> Adviser: Grade 2 - SSES</div>
                </div>
                <button class="faculty-action" onclick="window.location.href='classprogram.html?faculty=matulac'">
                    <i class="fas fa-table"></i> View Class Program
                </button>
            </div>

            <!-- Faculty Item 2 -->
            <div class="faculty-card">
                <div class="faculty-avatar">ME</div>
                <div class="faculty-info">
                    <div class="faculty-name">Maria T. Espineda</div>
                    <div class="faculty-role"><i class="fas fa-chalkboard-user"></i> Adviser: Grade 2 - Melon</div>
                </div>
                <button class="faculty-action" onclick="window.location.href='classprogram.html?faculty=espineda'">
                    <i class="fas fa-table"></i> View Class Program
                </button>
            </div>

            <!-- Faculty Item 3 -->
            <div class="faculty-card">
                <div class="faculty-avatar">JS</div>
                <div class="faculty-info">
                    <div class="faculty-name">Juan Carlos Silva</div>
                    <div class="faculty-role"><i class="fas fa-chalkboard-user"></i> Adviser: Grade 2 - Paho</div>
                </div>
                <button class="faculty-action" onclick="window.location.href='classprogram.html?faculty=silva'">
                    <i class="fas fa-table"></i> View Class Program
                </button>
            </div>

            <!-- Faculty Item 4 -->
            <div class="faculty-card">
                <div class="faculty-avatar">AG</div>
                <div class="faculty-info">
                    <div class="faculty-name">Anna L. Gaylan</div>
                    <div class="faculty-role"><i class="fas fa-chalkboard-user"></i> Adviser: Grade 2 - Pinya</div>
                </div>
                <button class="faculty-action" onclick="window.location.href='classprogram.html?faculty=gaylan'">
                    <i class="fas fa-table"></i> View Class Program
                </button>
            </div>

        </div>

    </div>

    <!-- DYNAMIC SEARCH SCRIPT -->
    <script>
        function filterDirectory() {
            const query = document.getElementById('facultySearch').value.toLowerCase();
            const cards = document.querySelectorAll('.faculty-card');

            cards.forEach(card => {
                const name = card.querySelector('.faculty-name').textContent.toLowerCase();
                const role = card.querySelector('.faculty-role').textContent.toLowerCase();

                if (name.includes(query) || role.includes(query)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }

        if (typeof checkAuthAndRole === "function") {
            checkAuthAndRole('principal'); 
        }
    </script>
</body>
</html>

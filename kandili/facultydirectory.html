<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Directory - Kandili Workspace</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

        <!--Scripts Section -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../static/supabaseClient.js"></script>
    <script src="../static/authGuard.js" data-allowed-roles="principal"></script>
    <script src="../static/logout.js"></script>

    <style>
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .search-bar {
            width: 100%;
            padding: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .directory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="dashboard-body">

    <!-- Navbar -->
    <header class="theme-nav">
        <div class="theme-nav__brand">
            <button class="theme-nav__back" onclick="window.history.back()" type="button"><i class="fas fa-arrow-left"></i></button>
            <div class="theme-nav__logo">
                <span class="theme-nav__logo-icon">🏫</span>
                <span>Kandili</span>
                <span class="logo-badge">Workspace</span>
            </div>
            <div class="theme-nav__title">Faculty Directory</div>
        </div>
        <div class="theme-nav__actions">
            <span class="theme-nav__date"><i class="far fa-calendar-alt"></i> July 20, 2026 | 2:30 PM</span>
            <button class="theme-nav__refresh" type="button"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </header>
    </header>

    <div class="dashboard-container" style="display: block;">
        
        <div class="directory-header">
            <div>
                <button class="btn-outline nav-back" onclick="window.history.back()" style="margin-bottom: 1rem;">← Back to Dashboard</button>
                <h2 class="section-title" style="margin: 0;">Faculty Class Programs Directory</h2>
            </div>
        </div>

        <input type="text" class="search-bar" placeholder="🔍 Search by teacher name, grade level, or subject...">
        
        <div class="directory-grid">
            <!-- Directory Item 1 -->
            <div class="info-box" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
                <div class="esf-header" style="margin-bottom: 1rem;">
                    <div>
                        <div class="esf-name">Beverly Ann C. Matulac</div>
                        <div class="esf-role">Adviser: Grade 2 - SSES</div>
                    </div>
                </div>
                <button class="btn btn-outline" style="width: 100%;" onclick="window.location.href='classprogram.html'">📄 View Class Program</button>
            </div>

            <!-- Directory Item 2 -->
            <div class="info-box" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
                <div class="esf-header" style="margin-bottom: 1rem;">
                    <div>
                        <div class="esf-name">Maria T. Espineda</div>
                        <div class="esf-role">Adviser: Grade 2 - Melon</div>
                    </div>
                </div>
                <button class="btn btn-outline" style="width: 100%;" onclick="window.location.href='classprogram.html'">📄 View Class Program</button>
            </div>

            <!-- Directory Item 3 -->
            <div class="info-box" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
                <div class="esf-header" style="margin-bottom: 1rem;">
                    <div>
                        <div class="esf-name">Juan Carlos Silva</div>
                        <div class="esf-role">Adviser: Grade 2 - Paho</div>
                    </div>
                </div>
                <button class="btn btn-outline" style="width: 100%;" onclick="window.location.href='classprogram.html'">📄 View Class Program</button>
            </div>

             <!-- Directory Item 4 -->
             <div class="info-box" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
                <div class="esf-header" style="margin-bottom: 1rem;">
                    <div>
                        <div class="esf-name">Anna L. Gaylan</div>
                        <div class="esf-role">Adviser: Grade 2 - Pinya</div>
                    </div>
                </div>
                <button class="btn btn-outline" style="width: 100%;" onclick="window.open('classprogram.html', '_blank')">📄 View Class Program</button>
            </div>
        </div>

    </div>

    <!-- Supabase & Auth Security Stack -->
    <script src="../static/supabaseClient.js"></script>
    <script src="../static/authGuard.js"></script>
    <script src="../static/logout.js"></script>
    <script>
        if (typeof checkAuthAndRole === "function") {
            checkAuthAndRole('principal'); 
        }
    </script>
    
</body>
</html>

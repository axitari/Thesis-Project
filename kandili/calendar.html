<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kandili - Master Calendar</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Supabase JS Library-->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-body">
    <header class="theme-nav">
        <div class="theme-nav__brand">
            <button class="theme-nav__back" onclick="window.history.back()" type="button"><i class="fas fa-arrow-left"></i></button>
            <div class="theme-nav__logo">
                <span class="theme-nav__logo-icon">🏫</span>
                <span>Kandili</span>
                <span class="logo-badge">Workspace</span>
            </div>
            <div class="theme-nav__title">Master Calendar</div>
        </div>
        <div class="theme-nav__actions">
            <span class="theme-nav__date" id="navDateDisplay"><i class="far fa-calendar-alt"></i> July 23, 2026</span>
            <button class="theme-nav__refresh" id="refreshBtn" type="button" onclick="window.location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </header>

    <div class="calendar-shell">
        <section class="card calendar-main-card">
            <div class="calendar-header">
                <div class="month-nav">
                    <button id="prevMonthBtn" class="btn-outline btn-small" type="button">&lt;</button>
                    <h2 id="monthLabel">Loading...</h2>
                    <button id="nextMonthBtn" class="btn-outline btn-small" type="button">&gt;</button>
                </div>
                <div class="calendar-actions">
                    <button id="todayBtn" class="btn-outline btn-small" type="button">Today</button>
                    <button id="addEventBtn" class="btn-primary btn-small" type="button">+ Add Event</button>
                </div>
            </div>

            <div class="calendar-body">
                <div class="calendar-grid-container">
                    <div class="calendar-weekdays">
                        <div>Sun</div>
                        <div>Mon</div>
                        <div>Tue</div>
                        <div>Wed</div>
                        <div>Thu</div>
                        <div>Fri</div>
                        <div>Sat</div>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>

                <aside class="calendar-sidebar">
                    <div class="sidebar-card">
                        <div class="sidebar-card-title">Selected Day</div>
                        <div id="selectedDateLabel" class="sidebar-date">Select a date</div>
                        <div id="selectedEvents" class="selected-events-list"></div>
                    </div>

                    <div class="sidebar-card">
                        <div class="sidebar-card-title">This Month</div>
                        <div class="stat-row">
                            <span>Total Events</span>
                            <strong id="monthEventCount">0</strong>
                        </div>
                        <div class="stat-row">
                            <span>Schoolwide</span>
                            <strong id="schoolCount">0</strong>
                        </div>
                        <div class="stat-row">
                            <span>Personal</span>
                            <strong id="personalCount">0</strong>
                        </div>
                    </div>
                </aside>
            </div>

            <!-- EVENT MODAL / FORM -->
            <form id="eventForm" class="event-form hidden" novalidate style="margin-top: 1rem; padding: 1.25rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
                <h4 style="margin: 0 0 1rem 0; color: #0038A8;" id="formHeader">Create New Event</h4>
                
                <input type="hidden" id="eventId">

                <div class="field-group">
                    <label for="eventTitle" style="font-weight: 600; font-size: 0.85rem;">Event / Class Title</label>
                    <input id="eventTitle" name="eventTitle" type="text" placeholder="e.g. Araling Panlipunan Class or Faculty Meeting" required style="width: 100%; padding: 0.6rem; margin-top: 0.25rem; margin-bottom: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                </div>

                <div class="field-group">
                    <label for="eventType" style="font-weight: 600; font-size: 0.85rem;">Category / Scope</label>
                    <select id="eventType" name="eventType" style="width: 100%; padding: 0.6rem; margin-top: 0.25rem; margin-bottom: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                        <!-- Options dynamically populated by calendarLogic.js -->
                    </select>
                </div>

                <div class="field-group">
                    <label for="eventTime" style="font-weight: 600; font-size: 0.85rem;">Time Schedule</label>
                    <input id="eventTime" name="eventTime" type="text" placeholder="e.g. 08:00 AM - 09:00 AM" style="width: 100%; padding: 0.6rem; margin-top: 0.25rem; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                </div>

                <div class="field-actions" style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; gap: 0.5rem;">
                        <button type="submit" id="saveEventBtn" class="btn-primary btn-small">Save Event</button>
                        <button id="cancelEventBtn" type="button" class="btn-outline btn-small">Cancel</button>
                    </div>
                    <button id="deleteEventBtn" type="button" class="btn-outline btn-small hidden" style="color: #dc2626; border-color: #fca5a5;">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </form>
        </section>
    </div>

    <!-- Supabase & Auth Security Stack -->
    <script src="../static/supabaseClient.js"></script>
    <script src="../static/authGuard.js"></script>
    <script src="../static/logout.js"></script>
    
    <!-- External Calendar Logic JS -->
    <script src="../static/calendarLogic.js"></script>

    <script>
        if (typeof checkAuthAndRole === "function") {
            checkAuthAndRole('any'); 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Activation &bull; Kandili Workspace</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="../static/style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="brand-logo">
                <i class="fas fa-shield-alt"></i> Kandili [Workspace]
            </div>
            <h1>Setting Up Your Account</h1>
            <p>Please wait while we secure your workspace...</p>
        </div>

        <!-- Stepper -->
        <div class="stepper">
            <div class="step completed">
                <div class="step-number"><i class="fas fa-check" style="font-size: 0.65rem;"></i></div>
                <span>Account Info</span>
            </div>
            <div class="step active">
                <div class="step-number">2</div>
                <span>Set Password</span>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <span>Complete</span>
            </div>
        </div>

        <!-- Loading Body -->
        <div class="auth-form" style="text-align: center; padding: 3rem 2rem;">
            
            <!-- Animated Spinner -->
            <div class="loading-spinner-wrapper" style="margin-bottom: 2rem;">
                <div class="spinner" style="width: 56px; height: 56px; border: 4px solid rgba(0, 56, 168, 0.15); border-top: 4px solid var(--primary, #0038A8); border-radius: 50%; margin: 0 auto; animation: spin 1s linear infinite;"></div>
            </div>

            <h2 id="loadingStatusText" style="font-size: 1.15rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main, #1e293b);">Validating security token...</h2>
            <p style="color: var(--text-muted, #64748b); font-size: 0.875rem; margin-bottom: 2.5rem;">
                Please do not close or refresh this window.
            </p>

            <!-- Processing Task Checklist -->
            <div style="background: #f8fafc; border: 1px solid var(--border-color, #cbd5e1); border-radius: 8px; padding: 1rem 1.25rem; text-align: left; max-width: 400px; margin: 0 auto; font-size: 0.85rem;">
                <div id="task1" class="task-item" style="display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; color: var(--text-muted, #64748b);">
                    <i class="fas fa-circle-notch fa-spin" id="icon1" style="color: var(--primary, #0038A8);"></i>
                    <span>Verifying invitation token</span>
                </div>
                <div id="task2" class="task-item" style="display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; color: var(--text-muted, #64748b); opacity: 0.5;">
                    <i class="fas fa-circle" style="font-size: 0.5rem;" id="icon2"></i>
                    <span>Hashing secure credentials</span>
                </div>
                <div id="task3" class="task-item" style="display: flex; align-items: center; gap: 10px; color: var(--text-muted, #64748b); opacity: 0.5;">
                    <i class="fas fa-circle" style="font-size: 0.5rem;" id="icon3"></i>
                    <span>Updating status to active</span>
                </div>
            </div>

        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        // Simulated background processing sequence leading to the success page
        setTimeout(() => {
            const task1 = document.getElementById('task1');
            task1.style.color = 'var(--success, #10b981)';
            task1.style.opacity = '1';
            const icon1 = document.getElementById('icon1');
            icon1.className = 'fas fa-check-circle';
            icon1.style.color = 'var(--success, #10b981)';
            
            const task2 = document.getElementById('task2');
            task2.style.opacity = '1';
            const icon2 = document.getElementById('icon2');
            icon2.className = 'fas fa-circle-notch fa-spin';
            icon2.style.color = 'var(--primary, #0038A8)';
            document.getElementById('loadingStatusText').textContent = 'Securing password credentials...';
        }, 1200);

        setTimeout(() => {
            const task2 = document.getElementById('task2');
            task2.style.color = 'var(--success, #10b981)';
            const icon2 = document.getElementById('icon2');
            icon2.className = 'fas fa-check-circle';
            icon2.style.color = 'var(--success, #10b981)';
            
            const task3 = document.getElementById('task3');
            task3.style.opacity = '1';
            const icon3 = document.getElementById('icon3');
            icon3.className = 'fas fa-circle-notch fa-spin';
            icon3.style.color = 'var(--primary, #0038A8)';
            document.getElementById('loadingStatusText').textContent = 'Activating your workspace profile...';
        }, 2400);

        setTimeout(() => {
            const task3 = document.getElementById('task3');
            task3.style.color = 'var(--success, #10b981)';
            const icon3 = document.getElementById('icon3');
            icon3.className = 'fas fa-check-circle';
            icon3.style.color = 'var(--success, #10b981)';
            document.getElementById('loadingStatusText').textContent = 'Activation complete!';
        }, 3400);

        // Redirect to success page after full sequence
        setTimeout(() => {
            window.location.href = 'activation-success.html';
        }, 4000);
    </script>
</body>
</html>
